name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Use the runner's default stable Xcode. Do not auto-select the "newest"
      # Xcode app because that can accidentally pick a release candidate.
      - name: Show Xcode toolchain
        run: |
          set -euxo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      # Avoid stale DerivedData / asset catalog state between runner image changes.
      - name: Clean Xcode state
        run: |
          rm -rf "$RUNNER_TEMP/DerivedData"
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/com.apple.dt.Xcode

      # Build the app and run the frostTests unit suite. Code signing is disabled
      # because CI only needs to compile and run logic tests — it does not
      # produce a distributable, signed, notarized artifact (that stays local;
      # see RELEASING.md).
      - name: Build & test (no code signing)
        env:
          NSUnbufferedIO: YES
        run: |
          set -euxo pipefail

          xcodebuild test \
            -project frost.xcodeproj \
            -scheme frost \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ${{ runner.temp }}/TestResults.xcresult
          if-no-files-found: ignore
